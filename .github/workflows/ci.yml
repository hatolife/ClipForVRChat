name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    name: Documentation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -s README.md
          test -s SPEC.md
          test -s LICENSE

      - name: Check project name references
        run: |
          grep -q "ClipForVRChat" README.md
          grep -q "ClipForVRChat" SPEC.md

  build:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go packages
        run: go test ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        run: wails build

      - name: Check executable
        shell: pwsh
        run: |
          if (!(Test-Path "build/bin/ClipForVRChat.exe")) {
            throw "build/bin/ClipForVRChat.exe was not created"
          }
