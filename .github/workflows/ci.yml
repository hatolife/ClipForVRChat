name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    name: Documentation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check required files
        run: |
          test -s README.md
          test -s src/SPEC.md
          test -s LICENSE
          test -s src/build/appicon.png
          test -s src/build/icons/appicon-16.png
          test -s src/build/icons/appicon-256.png

      - name: Check project name references
        run: |
          grep -q "ClipForVRChat" README.md
          grep -q "ClipForVRChat" src/SPEC.md

  build:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: src/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: src
        run: go test ./...

      - name: Check Go vulnerabilities
        working-directory: src
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        working-directory: src
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $releaseTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          node ../scripts/write-wails-info.mjs "ci" wails.json
          node ../scripts/write-wails-windows-info.mjs "ci" $shortSha build/windows/info.json
          wails build -ldflags "-X main.version=ci -X main.revision=$shortSha -X main.releaseTime=$releaseTime"

      - name: Check executable
        working-directory: src
        shell: pwsh
        run: |
          if (!(Test-Path "build/bin/ClipForVRChat.exe")) {
            throw "build/bin/ClipForVRChat.exe was not created"
          }
