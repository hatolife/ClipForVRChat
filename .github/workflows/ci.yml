name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "22"
  WAILS_VERSION: "v2.12.0"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  docs:
    name: Documentation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check required files
        run: |
          test -s README.md
          test -s src/SPEC.md
          test -s LICENSE
          test -s src/build/appicon.png
          test -s src/build/icons/appicon-16.png
          test -s src/build/icons/appicon-256.png

      - name: Check project name references
        run: |
          grep -q "ClipForVRChat" README.md
          grep -q "ClipForVRChat" src/SPEC.md

  build:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: src/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Check Wails API surface
        run: node scripts/check-wails-api-surface.mjs

      - name: Test Go packages
        working-directory: src
        run: go test ./...

      - name: Check Go vulnerabilities
        working-directory: src
        run: go run golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }} ./...

      - name: Build Spout helper
        shell: pwsh
        run: |
          cmake -S tools/spout-capture -B build/spout-capture -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build/spout-capture --config Release --target spout-capture

      - name: Check Spout helper
        shell: pwsh
        run: |
          $helper = Get-ChildItem build/spout-capture -Recurse -Filter spout-capture.exe | Select-Object -First 1
          if (!$helper) {
            throw "spout-capture.exe was not created"
          }
          $spoutDll = Join-Path $helper.DirectoryName "SpoutLibrary.dll"
          if (!(Test-Path $spoutDll)) {
            throw "SpoutLibrary.dll was not copied next to spout-capture.exe"
          }
          & $helper.FullName --help
          & $helper.FullName --version
          & $helper.FullName --list-senders

      - name: Add Go bin to PATH
        shell: pwsh
        run: '"$HOME/go/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append'

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v6
        with:
          path: ~/go/bin/wails.exe
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-wails-${{ env.WAILS_VERSION }}

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Check Wails
        run: wails version

      - name: Build application
        working-directory: src
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $releaseTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          node ../scripts/write-wails-info.mjs "ci" wails.json
          node ../scripts/write-wails-windows-info.mjs "ci" $shortSha build/windows/info.json
          wails build -ldflags "-X main.version=ci -X main.revision=$shortSha -X main.releaseTime=$releaseTime -X main.buildChannel=ci"

      - name: Check executable
        working-directory: src
        shell: pwsh
        run: |
          if (!(Test-Path "build/bin/ClipForVRChat.exe")) {
            throw "build/bin/ClipForVRChat.exe was not created"
          }
