name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    name: Documentation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -s README.md
          test -s src/SPEC.md
          test -s LICENSE
          test -s src/build/appicon.png
          test -s src/build/icons/appicon-16.png
          test -s src/build/icons/appicon-256.png

      - name: Check project name references
        run: |
          grep -q "ClipForVRChat" README.md
          grep -q "ClipForVRChat" src/SPEC.md

  build:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: src
        run: go test ./...

      - name: Check Go vulnerabilities
        working-directory: src
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        working-directory: src
        shell: pwsh
        run: wails build -ldflags "-X main.version=ci"

      - name: Check executable
        working-directory: src
        shell: pwsh
        run: |
          if (!(Test-Path "build/bin/ClipForVRChat.exe")) {
            throw "build/bin/ClipForVRChat.exe was not created"
          }
