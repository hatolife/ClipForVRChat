name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build exe and create GitHub release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go packages
        run: go test ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        run: wails build

      - name: Create source archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          git archive --format=zip --output="dist/ClipForVRChat-source.zip" HEAD

      - name: Package executable
        shell: pwsh
        run: |
          if (!(Test-Path "build/bin/ClipForVRChat.exe")) {
            throw "build/bin/ClipForVRChat.exe was not created"
          }
          New-Item -ItemType Directory -Force "dist/ClipForVRChat" | Out-Null
          Copy-Item "build/bin/ClipForVRChat.exe" "dist/ClipForVRChat/"
          Copy-Item "README.md" "dist/ClipForVRChat/"
          Copy-Item "LICENSE" "dist/ClipForVRChat/"
          Compress-Archive -Path "dist/ClipForVRChat/*" -DestinationPath "dist/ClipForVRChat-windows-amd64.zip" -Force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ClipForVRChat-source.zip
            dist/ClipForVRChat-windows-amd64.zip
          generate_release_notes: true
