name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "22"
  WAILS_VERSION: "v2.12.0"

jobs:
  build:
    name: Build exe and package release assets
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      asset_prefix: ${{ steps.version.outputs.asset_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: src/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: src
        run: go test ./...

      - name: Check Go vulnerabilities
        working-directory: src
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Add Go bin to PATH
        shell: pwsh
        run: '"$HOME/go/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append'

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v6
        with:
          path: ~/go/bin/wails.exe
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-wails-${{ env.WAILS_VERSION }}

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Check Wails
        run: wails version

      - name: Prepare version
        id: version
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          $tagName = $env:TAG_NAME
          if ($tagName -notmatch '^v[0-9A-Za-z][0-9A-Za-z._-]*$') {
            throw "Release tag contains unsupported characters: $tagName"
          }
          $shortSha = $env:COMMIT_SHA.Substring(0, 7)
          $releaseTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $isStable = $tagName -match '^v\d+\.\d+\.\d+$'
          $isReleaseCandidate = $tagName -match '^v\d+\.\d+\.\d+-rc\d+$'
          $draft = if ($isStable -or $isReleaseCandidate) { "false" } else { "true" }
          $prerelease = if ($isReleaseCandidate) { "true" } else { "false" }
          $assetPrefix = "ClipForVRChat-$tagName"
          "app_version=$tagName.$shortSha" >> $env:GITHUB_OUTPUT
          "version=$tagName" >> $env:GITHUB_OUTPUT
          "revision=$shortSha" >> $env:GITHUB_OUTPUT
          "release_time=$releaseTime" >> $env:GITHUB_OUTPUT
          "asset_prefix=$assetPrefix" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Prepare Windows version info
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_REVISION: ${{ steps.version.outputs.revision }}
        run: |
          node scripts/write-wails-info.mjs "$env:APP_VERSION" src/wails.json
          node scripts/write-wails-windows-info.mjs "$env:APP_VERSION" "$env:APP_REVISION" src/build/windows/info.json

      - name: Build application
        working-directory: src
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_REVISION: ${{ steps.version.outputs.revision }}
          APP_RELEASE_TIME: ${{ steps.version.outputs.release_time }}
        run: wails build -ldflags "-X main.version=$env:APP_VERSION -X main.revision=$env:APP_REVISION -X main.releaseTime=$env:APP_RELEASE_TIME -X main.buildChannel=release"

      - name: Prepare package directory
        shell: pwsh
        run: |
          if (!(Test-Path "src/build/bin/ClipForVRChat.exe")) {
            throw "src/build/bin/ClipForVRChat.exe was not created"
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force "dist/ClipForVRChat" | Out-Null
          Copy-Item "src/build/bin/ClipForVRChat.exe" "dist/ClipForVRChat/"
          Copy-Item "README.md" "dist/ClipForVRChat/"
          Copy-Item "LICENSE" "dist/ClipForVRChat/"
          @(
            "[InternetShortcut]",
            "URL=https://keys.openpgp.org/search?q=release-signing@hato.life"
          ) | Set-Content -Encoding ASCII "dist/ClipForVRChat/Release-signing-public-key.url"

      - name: Sign executable
        shell: bash
        env:
          ASSET_PREFIX: ${{ steps.version.outputs.asset_prefix }}
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.CI_RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.CI_RELEASE_GPG_PASSPHRASE }}
          RELEASE_GPG_FINGERPRINT: ${{ secrets.CI_RELEASE_GPG_FINGERPRINT }}
        run: |
          test -n "$RELEASE_GPG_PRIVATE_KEY"
          test -n "$RELEASE_GPG_PASSPHRASE"
          test -n "$RELEASE_GPG_FINGERPRINT"
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$RELEASE_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --local-user "$RELEASE_GPG_FINGERPRINT" \
            --armor --detach-sign \
            --output "dist/${ASSET_PREFIX}-windows-amd64.exe.asc" \
            "dist/ClipForVRChat/ClipForVRChat.exe"
          gpg --batch --verify \
            "dist/${ASSET_PREFIX}-windows-amd64.exe.asc" \
            "dist/ClipForVRChat/ClipForVRChat.exe"

      - name: Package executable
        shell: pwsh
        env:
          ASSET_PREFIX: ${{ steps.version.outputs.asset_prefix }}
        run: |
          Compress-Archive -Path "dist/ClipForVRChat/*" -DestinationPath "dist/$env:ASSET_PREFIX-windows-amd64.zip" -Force
          Get-FileHash "dist/$env:ASSET_PREFIX-windows-amd64.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $env:ASSET_PREFIX-windows-amd64.zip" } |
            Set-Content "dist/$env:ASSET_PREFIX-windows-amd64.zip.sha256"

      - name: Write build metadata
        shell: pwsh
        env:
          TAG_NAME: ${{ steps.version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          APP_FULL_VERSION: ${{ steps.version.outputs.app_version }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_REVISION: ${{ steps.version.outputs.revision }}
          APP_RELEASE_TIME: ${{ steps.version.outputs.release_time }}
          ASSET_PREFIX: ${{ steps.version.outputs.asset_prefix }}
        run: |
          $metadata = [ordered]@{
            tag = $env:TAG_NAME
            commit = $env:COMMIT_SHA
            appVersion = $env:APP_FULL_VERSION
            version = $env:APP_VERSION
            revision = $env:APP_REVISION
            releaseTime = $env:APP_RELEASE_TIME
            goVersion = "${{ env.GO_VERSION }}"
            nodeVersion = "${{ env.NODE_VERSION }}"
            wailsVersion = "${{ env.WAILS_VERSION }}"
          }
          $metadata | ConvertTo-Json -Depth 4 | Set-Content -Encoding UTF8 "dist/$env:ASSET_PREFIX-build-metadata.json"

      - name: Validate release assets
        shell: pwsh
        env:
          ASSET_PREFIX: ${{ steps.version.outputs.asset_prefix }}
        run: |
          $unexpected = Get-ChildItem dist -Recurse -File | Where-Object {
            $_.Name -like "*release-signing-public-key.asc" -or
            ($_.FullName -like "*\dist\ClipForVRChat\*" -and $_.Extension -eq ".asc")
          }
          if ($unexpected) {
            $unexpected | ForEach-Object { Write-Error "Unexpected file in release output: $($_.FullName)" }
            throw "Unexpected release output files were found"
          }
          $zipCheckDir = Join-Path $env:RUNNER_TEMP "release-zip-check"
          Remove-Item -Recurse -Force $zipCheckDir -ErrorAction SilentlyContinue
          Expand-Archive "dist/$env:ASSET_PREFIX-windows-amd64.zip" -DestinationPath $zipCheckDir
          $unexpectedZipFiles = Get-ChildItem $zipCheckDir -Recurse -File | Where-Object {
            $_.Name -like "*release-signing-public-key.asc" -or $_.Extension -eq ".asc"
          }
          if ($unexpectedZipFiles) {
            $unexpectedZipFiles | ForEach-Object { Write-Error "Unexpected file in release zip: $($_.FullName)" }
            throw "Unexpected files were found in release zip"
          }
          $required = @(
            "dist/$env:ASSET_PREFIX-windows-amd64.zip",
            "dist/$env:ASSET_PREFIX-windows-amd64.zip.sha256",
            "dist/$env:ASSET_PREFIX-windows-amd64.exe.asc",
            "dist/$env:ASSET_PREFIX-build-metadata.json",
            "dist/ClipForVRChat/Release-signing-public-key.url"
          )
          foreach ($path in $required) {
            if (!(Test-Path $path)) {
              throw "Required release output was not created: $path"
            }
          }

      - name: Prepare release notes
        if: steps.version.outputs.draft == 'false'
        env:
          TAG_NAME: ${{ steps.version.outputs.version }}
        run: node scripts/extract-release-notes.mjs "$TAG_NAME" RELEASE_NOTES.md dist/release-body.md --fallback-rc-notes

      - name: Prepare draft release notes
        if: steps.version.outputs.draft == 'true'
        env:
          TAG_NAME: ${{ steps.version.outputs.version }}
        run: node scripts/extract-release-notes.mjs "$TAG_NAME" RELEASE_NOTES.md dist/release-body.md --fallback-draft-notes

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ steps.version.outputs.asset_prefix }}
          path: |
            dist/${{ steps.version.outputs.asset_prefix }}-windows-amd64.zip
            dist/${{ steps.version.outputs.asset_prefix }}-windows-amd64.zip.sha256
            dist/${{ steps.version.outputs.asset_prefix }}-windows-amd64.exe.asc
            dist/${{ steps.version.outputs.asset_prefix }}-build-metadata.json
            dist/release-body.md

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release assets artifact
        uses: actions/download-artifact@v7
        with:
          name: release-assets-${{ needs.build.outputs.asset_prefix }}
          path: dist

      - name: Prepare version
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag_name="$TAG_NAME"
          if [[ ! "$tag_name" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag contains unsupported characters: $tag_name" >&2
            exit 1
          fi
          if [[ "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ || "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            draft=false
          else
            draft=true
          fi
          if [[ "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ steps.version.outputs.draft }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: dist/release-body.md
          files: |
            dist/${{ needs.build.outputs.asset_prefix }}-windows-amd64.zip
            dist/${{ needs.build.outputs.asset_prefix }}-windows-amd64.zip.sha256
            dist/${{ needs.build.outputs.asset_prefix }}-windows-amd64.exe.asc
            dist/${{ needs.build.outputs.asset_prefix }}-build-metadata.json
