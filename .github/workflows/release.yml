name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          mkdir -p dist
          git archive --format=zip --output="dist/ClipForVRChat-source.zip" HEAD

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClipForVRChat-source.zip
          generate_release_notes: true
