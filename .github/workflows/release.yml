name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build exe and create GitHub release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: src
        run: go test ./...

      - name: Check Go vulnerabilities
        working-directory: src
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Prepare version
        id: version
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "app_version=${{ github.ref_name }}.$shortSha" >> $env:GITHUB_OUTPUT
          "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          "revision=$shortSha" >> $env:GITHUB_OUTPUT

      - name: Build application
        working-directory: src
        shell: pwsh
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.revision=${{ steps.version.outputs.revision }}"

      - name: Prepare package directory
        shell: pwsh
        run: |
          if (!(Test-Path "src/build/bin/ClipForVRChat.exe")) {
            throw "src/build/bin/ClipForVRChat.exe was not created"
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force "dist/ClipForVRChat" | Out-Null
          Copy-Item "src/build/bin/ClipForVRChat.exe" "dist/ClipForVRChat/"
          Copy-Item "README.md" "dist/ClipForVRChat/"
          Copy-Item "LICENSE" "dist/ClipForVRChat/"

      - name: Sign executable
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.CI_RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.CI_RELEASE_GPG_PASSPHRASE }}
          RELEASE_GPG_FINGERPRINT: ${{ secrets.CI_RELEASE_GPG_FINGERPRINT }}
        run: |
          test -n "$RELEASE_GPG_PRIVATE_KEY"
          test -n "$RELEASE_GPG_PASSPHRASE"
          test -n "$RELEASE_GPG_FINGERPRINT"
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$RELEASE_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --local-user "$RELEASE_GPG_FINGERPRINT" \
            --armor --detach-sign \
            --output "dist/ClipForVRChat/ClipForVRChat.exe.asc" \
            "dist/ClipForVRChat/ClipForVRChat.exe"
          gpg --batch --verify \
            "dist/ClipForVRChat/ClipForVRChat.exe.asc" \
            "dist/ClipForVRChat/ClipForVRChat.exe"
          cp "dist/ClipForVRChat/ClipForVRChat.exe.asc" "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.exe.asc"
          gpg --batch --armor --export "$RELEASE_GPG_FINGERPRINT" > "dist/ClipForVRChat/ClipForVRChat-release-signing-public-key.asc"
          cp "dist/ClipForVRChat/ClipForVRChat-release-signing-public-key.asc" "dist/ClipForVRChat-${{ github.ref_name }}-release-signing-public-key.asc"

      - name: Package executable
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ClipForVRChat/*" -DestinationPath "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" -Force
          Get-FileHash "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" } |
            Set-Content "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip
            dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip.sha256
            dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.exe.asc
            dist/ClipForVRChat-${{ github.ref_name }}-release-signing-public-key.asc
          generate_release_notes: true
