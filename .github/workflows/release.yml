name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build exe and create GitHub release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: src
        run: go test ./...

      - name: Check Go vulnerabilities
        working-directory: src
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Prepare version
        id: version
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $releaseTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $isStable = $tagName -match '^v\d+\.\d+\.\d+$'
          $draft = if ($isStable) { "false" } else { "true" }
          "app_version=$tagName.$shortSha" >> $env:GITHUB_OUTPUT
          "version=$tagName" >> $env:GITHUB_OUTPUT
          "revision=$shortSha" >> $env:GITHUB_OUTPUT
          "release_time=$releaseTime" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT

      - name: Prepare Windows version info
        shell: pwsh
        run: |
          node scripts/write-wails-info.mjs "${{ steps.version.outputs.version }}" src/wails.json
          node scripts/write-wails-windows-info.mjs "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.revision }}" src/build/windows/info.json

      - name: Build application
        working-directory: src
        shell: pwsh
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.revision=${{ steps.version.outputs.revision }} -X main.releaseTime=${{ steps.version.outputs.release_time }}"

      - name: Prepare package directory
        shell: pwsh
        run: |
          if (!(Test-Path "src/build/bin/ClipForVRChat.exe")) {
            throw "src/build/bin/ClipForVRChat.exe was not created"
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force "dist/ClipForVRChat" | Out-Null
          Copy-Item "src/build/bin/ClipForVRChat.exe" "dist/ClipForVRChat/"
          Copy-Item "README.md" "dist/ClipForVRChat/"
          Copy-Item "LICENSE" "dist/ClipForVRChat/"
          @(
            "[InternetShortcut]",
            "URL=https://keys.openpgp.org/search?q=release-signing@hato.life"
          ) | Set-Content -Encoding ASCII "dist/ClipForVRChat/Release-signing-public-key.url"

      - name: Sign executable
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.CI_RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.CI_RELEASE_GPG_PASSPHRASE }}
          RELEASE_GPG_FINGERPRINT: ${{ secrets.CI_RELEASE_GPG_FINGERPRINT }}
        run: |
          test -n "$RELEASE_GPG_PRIVATE_KEY"
          test -n "$RELEASE_GPG_PASSPHRASE"
          test -n "$RELEASE_GPG_FINGERPRINT"
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$RELEASE_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --local-user "$RELEASE_GPG_FINGERPRINT" \
            --armor --detach-sign \
            --output "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.exe.asc" \
            "dist/ClipForVRChat/ClipForVRChat.exe"
          gpg --batch --verify \
            "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.exe.asc" \
            "dist/ClipForVRChat/ClipForVRChat.exe"

      - name: Package executable
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ClipForVRChat/*" -DestinationPath "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" -Force
          Get-FileHash "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" } |
            Set-Content "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip.sha256"

      - name: Validate release assets
        shell: pwsh
        run: |
          $unexpected = Get-ChildItem dist -Recurse -File | Where-Object {
            $_.Name -like "*release-signing-public-key.asc" -or
            ($_.FullName -like "*\dist\ClipForVRChat\*" -and $_.Extension -eq ".asc")
          }
          if ($unexpected) {
            $unexpected | ForEach-Object { Write-Error "Unexpected file in release output: $($_.FullName)" }
            throw "Unexpected release output files were found"
          }
          $zipCheckDir = Join-Path $env:RUNNER_TEMP "release-zip-check"
          Remove-Item -Recurse -Force $zipCheckDir -ErrorAction SilentlyContinue
          Expand-Archive "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip" -DestinationPath $zipCheckDir
          $unexpectedZipFiles = Get-ChildItem $zipCheckDir -Recurse -File | Where-Object {
            $_.Name -like "*release-signing-public-key.asc" -or $_.Extension -eq ".asc"
          }
          if ($unexpectedZipFiles) {
            $unexpectedZipFiles | ForEach-Object { Write-Error "Unexpected file in release zip: $($_.FullName)" }
            throw "Unexpected files were found in release zip"
          }
          $required = @(
            "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip",
            "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip.sha256",
            "dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.exe.asc",
            "dist/ClipForVRChat/Release-signing-public-key.url"
          )
          foreach ($path in $required) {
            if (!(Test-Path $path)) {
              throw "Required release output was not created: $path"
            }
          }

      - name: Prepare release notes
        if: steps.version.outputs.draft == 'false'
        run: node scripts/extract-release-notes.mjs "${{ github.ref_name }}" RELEASE_NOTES.md dist/release-body.md

      - name: Prepare draft release notes
        if: steps.version.outputs.draft == 'true'
        run: node scripts/extract-release-notes.mjs "${{ github.ref_name }}" RELEASE_NOTES.md dist/release-body.md --fallback-draft-notes

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ steps.version.outputs.draft }}
          body_path: dist/release-body.md
          files: |
            dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip
            dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.zip.sha256
            dist/ClipForVRChat-${{ github.ref_name }}-windows-amd64.exe.asc
